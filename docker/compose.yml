services:
  emma-chatbot:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        EMMA_PILOT_BACKEND_ORIGIN: ${EMMA_PILOT_BACKEND_ORIGIN:-http://localhost:3000}
    ports:
      - '3000:3000'
    environment:
      - NO_HTTPS=1
      - REDIS_URL=redis://redis:6379
      - EMMA_PILOT_BACKEND_ORIGIN=${EMMA_PILOT_BACKEND_ORIGIN:-http://localhost:3000}
    env_file:
      - .env
    dns:
      - 8.8.8.8 # Google's public DNS server
      - 8.8.4.4 # Google's public DNS server
    networks:
      - emma-chatbot-networks
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  emma-chatbot-worker:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--conditions=react-server
    networks:
      - emma-chatbot-networks
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  emma-chatbot-self-learning-worker:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.worker
    command:
      [
        "node",
        "--conditions=react-server",
        "--import",
        "tsx",
        "./src/lib/self-learning/worker.ts",
      ]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--conditions=react-server
    networks:
      - emma-chatbot-networks
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:17
    env_file:
      - .env
    ports:
      - '5453:5432'
    networks:
      - emma-chatbot-networks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6377:6379'
    networks:
      - emma-chatbot-networks
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  emma-chatbot-networks:
    driver: bridge
