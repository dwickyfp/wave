services:
  wave-chatbot:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NO_HTTPS=1
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    dns:
      - 8.8.8.8 # Google's public DNS server
      - 8.8.4.4 # Google's public DNS server
    networks:
      - wave-chatbot-networks
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  wave-chatbot-worker:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--conditions=react-server
    networks:
      - wave-chatbot-networks
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:17
    env_file:
      - .env
    networks:
      - wave-chatbot-networks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - wave-chatbot-networks
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  wave-chatbot-networks:
    driver: bridge
